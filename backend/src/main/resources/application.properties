spring.application.name=graduates

# ============== 数据库配置（SQLite 文件型数据库）==============
# 这个路径相对项目根目录，SQLite 会自动创建 graduates.db 文件
spring.datasource.url=jdbc:sqlite:./data/graduates.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# ============== MyBatis-Plus 配置 ==============
# Java 字段名 graduateSchool 自动映射数据库字段 graduation_school
mybatis-plus.configuration.map-underscore-to-camel-case=true

# ============== 调试用：打印 SQL 语句 ==============
# 控制台会显示执行的 SQL，方便你调试时看清楚发生了什么
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
